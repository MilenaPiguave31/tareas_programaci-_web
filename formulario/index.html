<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro Básico</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
            background: linear-gradient(135deg, #8db828 0%, #d3dacf 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .form-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
    
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 1;
            height: 24px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8db828 0%, #d3dacf 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .datos-enviados {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #28a745;
        }
        
        .datos-enviados h3 {
            margin: 0 0 10px 0;
            color: #28a745;
            font-size: 18px;
        }
        
        .datos-enviados p {
            margin: 5px 0;
            color: #555;
        }
        
        .requerido {
            color: #dc3545;
            font-size: 12px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1> Formulario de Registro</h1>
        
        <form action="#" method="POST" id="miFormulario">
            <div class="form-group">
                <label for="nombre">
                    Nombre completo <span class="requerido">*</span>
                </label>
                <input 
                    type="text" 
                    id="nombre" 
                    name="nombre" 
                    placeholder="Ej: Mile P"
                    required
                    minlength="3"
                    maxlength="50"
                >
            </div>

            <div class="form-group">
                <label for="email">
                    Correo electrónico <span class="requerido">*</span>
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="ejemplo@correo.com"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="edad">
                    Edad <span class="requerido">*</span>
                </label>
                <input 
                    type="number" 
                    id="edad" 
                    name="edad" 
                    placeholder="Ej: 18"
                    required
                    min="1"
                    max="120"
                    step="1"
                >
            </div>
            
            <button type="submit" id="btnEnviar">
                 Enviar Datos
            </button>
        </form>
        <div class="datos-enviados" id="resultado" style="display: none;">
            <h3>✅ Datos enviados correctamente:</h3>
            <p><strong>Nombre:</strong> <span id="mostrarNombre"></span></p>
            <p><strong>Email:</strong> <span id="mostrarEmail"></span></p>
            <p><strong>Edad:</strong> <span id="mostrarEdad"></span> años</p>
        </div>
    </div>

    <script>

        document.getElementById('miFormulario').addEventListener('submit', function(event) {
   
            event.preventDefault();
     
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const edad = document.getElementById('edad').value;
            
   
            if (nombre && email && edad) {
    
                document.getElementById('mostrarNombre').textContent = nombre;
                document.getElementById('mostrarEmail').textContent = email;
                document.getElementById('mostrarEdad').textContent = edad;
                
                document.getElementById('resultado').style.display = 'block';
                document.getElementById('miFormulario').reset();
                
                alert('¡Formulario enviado con éxito!');
            } else {
                alert('Por favor, completa todos los campos requeridos.');
            }
        });
    </script>
</body>
</html>
