<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja con Slider</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
 
        <div class="caja-interactiva" id="caja">
            <div class="contenido-caja">
     
                <div class="texto-centrado" id="texto">
                    Diseño<br>Interactivo
                </div>
             
                <div class="slider-container">
                    <span class="slider-label">Ajusta el brillo</span>
                    <input type="range" min="0" max="100" value="50" class="slider" id="miSlider">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
